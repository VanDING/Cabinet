name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: '10' }
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - name: Architecture Lint
        run: pnpm exec tsx tools/arch-lint.ts
      - run: pnpm audit || true
      - name: Commit message (conventional commits)
        if: github.event_name == 'push'
        run: echo "${{ github.event.head_commit.message }}" | npx commitlint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: '10' }
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: '10' }
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Unit tests
        run: pnpm -r --filter '!@cabinet/e2e-browser' --filter '!@cabinet/desktop' test -- --run
      - name: Coverage report (per-package thresholds enforced)
        run: pnpm -r --filter '!@cabinet/e2e-browser' --filter '!@cabinet/desktop' test -- --run --coverage
      - name: Coverage gate (baseline diff, minimum thresholds)
        run: pnpm coverage:gate
      - run: cd tests/e2e && npx vitest run

  browser-e2e:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.head_commit.message, '[browser]') || contains(github.event.head_commit.message, '[e2e]') }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: '10' }
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm --filter @cabinet/e2e-browser test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with: { version: '10' }
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
