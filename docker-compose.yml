version: "3.8"
services:
  cabinet:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - cabinet_data:/app/data
    environment:
      - PORT=3000
      - CABINET_MASTER_PASSWORD=${CABINET_MASTER_PASSWORD:-change-me}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

volumes:
  cabinet_data:
